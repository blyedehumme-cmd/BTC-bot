# Render Blueprint — Lesly FastAPI backend
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lesly-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: worker
    name: btc-bot-worker
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python btc_bot.py
    envVars:
      - key: DRY_RUN
        value: "true"
      - key: USE_AI_ASSIST
        value: "true"
      - key: ENABLE_HMM_FILTER
        value: "false"
      - key: ALLOWED_HMM_REGIMES
        value: ""
      - key: HMM_REGIME_CONTEXT
        value: ""
      - key: HMM_REGIME_CONTEXT_FILE
        value: ""
      - key: PRODUCT_ID
        value: BTC-USDC
      - key: EXCHANGE
        value: kraken
      - key: EXCHANGE_MODE
        value: futures
      - key: MAX_LEVERAGE
        value: "3"
      - key: DYNAMIC_LEVERAGE_ENABLED
        value: "true"
      - key: DYNAMIC_LEVERAGE_STRONG_ADX
        value: "30"
      - key: DYNAMIC_LEVERAGE_MID
        value: "2"
      - key: WATCHLIST
        value: BTC,ETH
      - key: MAX_TRADES_PER_DAY
        value: "3"
      - key: MIN_MINUTES_BETWEEN_TRADES
        value: "240"
      - key: MAX_RISK_PER_TRADE
        value: "0.03"
      - key: MAX_POSITION_BALANCE_PCT
        value: "1.0"
      - key: MAX_OPEN_POSITIONS
        value: "1"
      - key: ADX_THRESHOLD
        value: "24"
      - key: VOLUME_HEALTH_MIN
        value: "0.60"
      - key: ATR_TRAILING_MULTIPLIER
        value: "3.0"
      - key: REQUIRE_MTF_MACD_CONFIRM
        value: "true"
      - key: AI_CONFIDENCE_BUFFER
        value: "0.00"
      - key: OPENAI_MIN_SECONDS_BETWEEN_CALLS
        value: "1800"
      - key: MAX_ENTRY_EMA21_ATR_DISTANCE
        value: "2.5"
      - key: MAX_ENTRY_EMA50_ATR_DISTANCE
        value: "4.0"
      - key: SAME_SIDE_WIN_STREAK_LIMIT
        value: "3"
      - key: WIN_STREAK_PULLBACK_ATR_DISTANCE
        value: "1.0"
      - key: KRAKEN_PAIR
        value: XBTUSD
      - key: KRAKEN_FUTURES_SYMBOL
        value: PI_XBTUSD
      - key: KRAKEN_BASE_ASSET
        value: XXBT
      - key: KRAKEN_QUOTE_ASSET
        value: ZUSD
      - key: BACKEND_API_URL
        value: https://lesly-backend.onrender.com/api
      - key: CB_API_KEY
        sync: false
      - key: CB_API_SECRET
        sync: false
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: TELEGRAM_POLLING_ENABLED
        value: "false"
      - key: TELEGRAM_COMMANDS_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOW_REAL_SPOT_SHORT
        value: "false"
