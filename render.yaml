# Render Blueprint — Lesly FastAPI backend
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lesly-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
